services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2053:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "6053:6053"
    volumes:
      - ./api/transit.db:/app/transit.db
      - ./api/uploads:/app/uploads
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
